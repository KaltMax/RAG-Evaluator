services:
  postgres:
    image: postgres:18
    container_name: ragevaluator-postgres
    environment:
      POSTGRES_DB: ragevaluator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:9.11
    container_name: ragevaluator-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json
    ports:
      - "5050:80"
    depends_on:
      - postgres

  ollama:
    image: ollama/ollama:0.13.5
    container_name: ragevaluator-ollama
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-init.sh:/ollama-init.sh
    ports:
      - "11434:11434"
    entrypoint: ["/bin/bash", "/ollama-init.sh"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "/bin/ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  ragevaluator-api:
    container_name: ragevaluator-api
    build:
      context: .
      dockerfile: RagEvaluator.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=ragevaluator;Username=postgres;Password=postgres
      - RagConfiguration__OllamaEndpoint=http://ollama:11434/v1
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  ragevaluator-web-ui:
    container_name: ragevaluator-web-ui
    build:
      context: ./RagEvaluator.WebUi
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - ragevaluator-api
    environment:
      - VITE_API_URL=http://localhost:5000

volumes:
  postgres_data:
  ollama_data:
  pgadmin_data: