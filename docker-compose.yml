services:
  postgres:
    image: pgvector/pgvector:0.8.1-pg18
    container_name: ragevaluator-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:9.11
    container_name: ragevaluator-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - postgres

  ollama:
    image: ollama/ollama:0.13.5
    container_name: ragevaluator-ollama
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE}
      - OLLAMA_EMBEDDING_MODELS=${OLLAMA_EMBEDDING_MODELS}
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL}
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-init.sh:/ollama-init.sh
    ports:
      - "${OLLAMA_PORT}:11434"
    entrypoint: ["/bin/bash", "/ollama-init.sh"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "/bin/ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  ragevaluator-api:
    image: ragevaluator-api
    container_name: ragevaluator-api
    user: "0:0"
    build:
      context: .
      dockerfile: RagEvaluator.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - RagConfiguration__OllamaEndpoint=http://ollama:${OLLAMA_PORT}/v1
      - RagConfiguration__ChatModel=${OLLAMA_CHAT_MODEL}
      - RagConfiguration__ChunkingStrategy=${RAG_CHUNKING_STRATEGY}
      - RagConfiguration__ChunkSize=${RAG_CHUNK_SIZE}
      - RagConfiguration__ChunkOverlap=${RAG_CHUNK_OVERLAP}
      - RagConfiguration__SimilarityThreshold=${RAG_SIMILARITY_THRESHOLD}
      - RagConfiguration__AvailableEmbeddingModels=${OLLAMA_EMBEDDING_MODELS}
      - RagConfiguration__PromptTemplate=${RAG_PROMPT_TEMPLATE}
      - RagConfiguration__PromptBasic=${RAG_PROMPT_BASIC}
      - RagConfiguration__PromptInstructed=${RAG_PROMPT_INSTRUCTED}
      - RagConfiguration__PromptLanguageAwareEn=${RAG_PROMPT_LANGUAGE_AWARE_EN}
      - RagConfiguration__PromptLanguageAwareDe=${RAG_PROMPT_LANGUAGE_AWARE_DE}
      - FileStorageConfiguration__BaseDirectory=${FILE_STORAGE_BASE_DIRECTORY}
    ports:
      - "${API_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - document_uploads:/app/uploads

  ragevaluator-web-ui:
    image: ragevaluator-web-ui
    container_name: ragevaluator-web-ui
    build:
      context: ./RagEvaluator.WebUi
      dockerfile: Dockerfile
    ports:
      - "${WEB_UI_PORT}:80"
    depends_on:
      - ragevaluator-api
    environment:
      - VITE_API_URL=${VITE_API_URL}

volumes:
  postgres_data:
  ollama_data:
  pgadmin_data:
  document_uploads: